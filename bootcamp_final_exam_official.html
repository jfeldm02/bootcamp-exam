<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Justin's Math in AI Bootcamp — Final Exam</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #243048;
    --accent: #4ecca3;
    --accent2: #f0a500;
    --text: #e8edf5;
    --text-muted: #7a8ba8;
    --correct: #22c55e;
    --wrong: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 72% 8%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 33% 55%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 80%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 90%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 95% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 30%, rgba(255,255,255,0.2) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  #app { position: relative; z-index: 1; }

  /* ── COVER ── */
  #cover {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    gap: 1.8rem;
  }

  .cover-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2.2rem, 5.5vw, 4.5rem);
    line-height: 1.1;
  }
  .cover-title em { font-style: italic; color: var(--accent); }
  .cover-subtitle {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    color: var(--text-muted);
    margin-top: -0.8rem;
  }

  .cover-meta { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; }
  .cover-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.5rem 1.2rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    color: var(--text-muted);
  }
  .cover-pill span { color: var(--accent2); }

  .sections-preview { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; max-width: 600px; }
  .section-tag { padding: 0.4rem 0.9rem; border-radius: 3px; font-size: 0.78rem; font-weight: 500; letter-spacing: 0.05em; }
  .tag-la   { background: rgba(99,102,241,0.15); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.3); }
  .tag-calc { background: rgba(236,72,153,0.15); color: #f9a8d4; border: 1px solid rgba(236,72,153,0.3); }
  .tag-prob { background: rgba(245,158,11,0.15); color: #fcd34d; border: 1px solid rgba(245,158,11,0.3); }
  .tag-stat { background: rgba(20,184,166,0.15); color: #5eead4; border: 1px solid rgba(20,184,166,0.3); }

  /* Name input on cover */
  .cover-form { display: flex; flex-direction: column; gap: 0.75rem; width: 100%; max-width: 360px; }
  .cover-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    padding: 0.75rem 1rem;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
  }
  .cover-input::placeholder { color: var(--text-muted); }
  .cover-input:focus { border-color: var(--accent); }
  .cover-input-error { border-color: var(--wrong) !important; }
  .form-error { font-size: 0.78rem; color: #fca5a5; font-family: 'IBM Plex Mono', monospace; text-align: center; min-height: 1rem; }

  .btn-start {
    padding: 0.9rem 3rem;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(78,204,163,0.35); }

  /* ── EXAM ── */
  #exam { display: none; max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }

  .progress-bar-wrap {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg); padding: 1rem 0; margin-bottom: 2rem;
    border-bottom: 1px solid var(--border);
  }
  .progress-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem; font-size: 0.8rem; color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; }
  .progress-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 0.4s ease; }

  .section-header { margin: 3rem 0 1.5rem; display: flex; align-items: center; gap: 1rem; }
  .section-header:first-of-type { margin-top: 0; }
  .section-number { font-family: 'DM Serif Display', serif; font-size: 3rem; line-height: 1; opacity: 0.12; color: var(--text); user-select: none; }
  .section-info { flex: 1; }
  .section-name { font-family: 'DM Serif Display', serif; font-size: 1.5rem; line-height: 1.2; }
  .section-desc { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.2rem; font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.04em; }
  .section-line { flex: 1; height: 1px; }

  .q-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.8rem; margin-bottom: 1.2rem; transition: border-color 0.2s; }
  .q-card:focus-within { border-color: var(--accent); }
  .q-card.answered-correct { border-color: var(--correct); }
  .q-card.answered-wrong { border-color: var(--wrong); }

  .q-label { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1rem; }
  .q-num { font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: var(--text-muted); letter-spacing: 0.1em; }
  .q-text { font-size: 1rem; line-height: 1.65; color: var(--text); margin-bottom: 1.2rem; }
  .q-text .math { font-family: 'IBM Plex Mono', monospace; font-size: 0.9em; background: var(--surface2); padding: 0.15em 0.4em; border-radius: 3px; color: var(--accent2); }

  .choices { display: flex; flex-direction: column; gap: 0.55rem; }
  .choice-btn {
    display: flex; align-items: flex-start; gap: 0.75rem;
    padding: 0.75rem 1rem; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; cursor: pointer; text-align: left; color: var(--text);
    font-size: 0.92rem; font-family: 'DM Sans', sans-serif; transition: all 0.15s; line-height: 1.5;
  }
  .choice-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(78,204,163,0.06); }
  .choice-btn:disabled { cursor: default; }
  .choice-btn.selected-correct { background: rgba(34,197,94,0.12); border-color: var(--correct); color: #86efac; }
  .choice-btn.selected-wrong   { background: rgba(239,68,68,0.12);  border-color: var(--wrong);   color: #fca5a5; }
  .choice-btn.reveal-correct   { background: rgba(34,197,94,0.06);  border-color: rgba(34,197,94,0.4); color: #86efac; }

  .choice-letter { width:22px; height:22px; min-width:22px; border-radius:50%; background:var(--border); display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono',monospace; font-size:0.7rem; color:var(--text-muted); font-weight:500; margin-top:1px; }
  .choice-btn.selected-correct .choice-letter, .choice-btn.reveal-correct .choice-letter { background:var(--correct); color:white; }
  .choice-btn.selected-wrong   .choice-letter { background:var(--wrong);   color:white; }

  .num-input-wrap { display:flex; align-items:center; gap:0.75rem; flex-wrap:wrap; }
  .num-input { background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:1.1rem; padding:0.6rem 1rem; width:140px; text-align:center; outline:none; transition:border-color 0.15s; }
  .num-input:focus { border-color:var(--accent); }
  .num-input:disabled { opacity:0.6; }
  .num-input.correct-input { border-color:var(--correct); color:#86efac; }
  .num-input.wrong-input   { border-color:var(--wrong);   color:#fca5a5; }

  .btn-check { padding:0.6rem 1.4rem; background:transparent; border:1px solid var(--accent); border-radius:6px; color:var(--accent); font-family:'DM Sans',sans-serif; font-size:0.88rem; cursor:pointer; transition:all 0.15s; }
  .btn-check:hover:not(:disabled) { background:var(--accent); color:var(--bg); }
  .btn-check:disabled { opacity:0.4; cursor:default; }

  .feedback { margin-top:0.9rem; font-size:0.88rem; padding:0.7rem 1rem; border-radius:6px; line-height:1.5; display:none; }
  .feedback.show { display:block; }
  .feedback.correct-fb { background:rgba(34,197,94,0.1); color:#86efac; border:1px solid rgba(34,197,94,0.25); }
  .feedback.wrong-fb   { background:rgba(239,68,68,0.1);  color:#fca5a5; border:1px solid rgba(239,68,68,0.25); }
  .feedback .solution  { margin-top:0.5rem; font-family:'IBM Plex Mono',monospace; font-size:0.82rem; opacity:0.85; }

  /* ── RESULTS ── */
  #results { display:none; max-width:700px; margin:0 auto; padding:3rem 1.5rem; }

  .result-hero { text-align:center; margin-bottom:3rem; }
  .score-ring { width:140px; height:140px; margin:0 auto 1.5rem; position:relative; }
  .score-ring svg { transform:rotate(-90deg); }
  .score-ring-text { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .score-pct { font-family:'DM Serif Display',serif; font-size:2.2rem; line-height:1; }
  .score-label { font-family:'IBM Plex Mono',monospace; font-size:0.65rem; color:var(--text-muted); letter-spacing:0.1em; margin-top:0.2rem; }
  .result-title { font-family:'DM Serif Display',serif; font-size:2rem; margin-bottom:0.5rem; }
  .result-subtitle { color:var(--text-muted); font-size:0.9rem; }

  /* Certificate */
  .cert-wrap {
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 2rem;
    position: relative;
  }
  .cert-bg {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    filter: brightness(0.45);
  }
  .cert-content {
    position: relative; z-index: 1;
    padding: 2.5rem 2rem;
    text-align: center;
  }
  .cert-eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 1rem;
    border: 1px solid rgba(240,165,0,0.4);
    display: inline-block;
    padding: 0.3rem 1rem;
    border-radius: 2px;
  }
  .cert-name {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    color: var(--text);
    margin-bottom: 0.5rem;
  }
  .cert-body {
    font-size: 0.9rem;
    color: rgba(232,237,245,0.75);
    margin-bottom: 1.5rem;
    line-height: 1.6;
  }
  .cert-badges {
    display: flex; gap: 0.6rem; flex-wrap: wrap; justify-content: center; margin-bottom: 1.8rem;
  }
  .cert-badge {
    padding: 0.3rem 0.8rem;
    border-radius: 3px;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.06em;
  }
  .cert-sig {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 1.1rem;
    color: rgba(232,237,245,0.6);
    border-top: 1px solid rgba(255,255,255,0.15);
    padding-top: 1rem;
    margin-top: 0.5rem;
  }
  .btn-download {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.8rem 2rem;
    background: var(--accent2);
    color: var(--bg);
    border: none;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: transform 0.15s, box-shadow 0.15s;
    margin-top: 0.5rem;
    text-decoration: none;
  }
  .btn-download:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(240,165,0,0.3); }

  .btn-demo {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.8rem 2rem;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: transform 0.15s, box-shadow 0.15s;
    margin-top: 0.5rem;
    text-decoration: none;
  }
  .btn-demo:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(78,204,163,0.35); }

  .cert-actions {
    display: flex;
    gap: 0.75rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 2rem;
  }
  .demo-password {
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: -1.2rem;
    margin-bottom: 2rem;
  }
  .demo-password span { color: var(--accent2); letter-spacing: 0.05em; }

  .section-scores { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:2rem; }
  .section-score-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:1.2rem 1.4rem; }
  .ss-name { font-size:0.75rem; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:0.5rem; }
  .ss-bar-wrap { height:5px; background:var(--border); border-radius:3px; overflow:hidden; margin-bottom:0.4rem; }
  .ss-bar { height:100%; border-radius:3px; }
  .ss-fraction { font-family:'IBM Plex Mono',monospace; font-size:0.78rem; color:var(--text-muted); }

  .btn-retake { display:block; width:100%; padding:1rem; background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--text-muted); font-family:'DM Sans',sans-serif; font-size:0.9rem; cursor:pointer; transition:all 0.15s; margin-top:1rem; }
  .btn-retake:hover { border-color:var(--accent); color:var(--accent); }

  .btn-retry {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.3rem 0.8rem;
    background: transparent;
    border: 1px solid var(--accent2);
    border-radius: 4px;
    color: var(--accent2);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.15s;
    float: right;
    margin-top: -2px;
  }
  .btn-retry:hover { background: var(--accent2); color: var(--bg); }
</style>
</head>
<body>
<div id="app">

<!-- COVER -->
<div id="cover">
  <div class="cover-title">Justin's Math in AI<br><em>Bootcamp</em></div>
  <div class="cover-subtitle">Final Exam</div>
  <div class="cover-meta">
    <div class="cover-pill"><span>12</span> questions</div>
    <div class="cover-pill"><span>4</span> sections</div>
    <div class="cover-pill">~<span>30</span> min</div>
  </div>
  <div class="sections-preview">
    <span class="section-tag tag-la">Linear Algebra</span>
    <span class="section-tag tag-calc">Calculus</span>
    <span class="section-tag tag-prob">Probability</span>
    <span class="section-tag tag-stat">Statistics</span>
  </div>
  <div class="cover-form">
    <input class="cover-input" id="student-name" type="text" placeholder="Your full name" autocomplete="name">
    <div class="form-error" id="form-error"></div>
  </div>
  <button class="btn-start" onclick="validateAndStart()">Begin Exam</button>
</div>

<!-- EXAM -->
<div id="exam"></div>

<!-- RESULTS -->
<div id="results"></div>

</div>

<!-- Hidden canvas for certificate download -->
<canvas id="cert-canvas" style="display:none"></canvas>

    choices:["4.0","4.5","5.5","3.0"], answer:0, solution:"θ_new = 5 − 0.5 × 2 = 5 − 1 = 4.0", hint:"Apply the update rule directly: θ_new = θ − α·∇ℒ" },
  { section:"Probability", sectionTag:"tag-prob", sectionColor:"#f59e0b", id:"prob1", type:"mc",
    text:"What is the probability of rolling a <strong>6</strong> on a fair die <strong>three times in a row</strong>?",
    choices:["1/216","1/36","1/18","1/72"], answer:0, solution:"P = (1/6)³ = 1/216 ≈ 0.0046", hint:"Independent events: P(A and B and C) = P(A)·P(B)·P(C)" },

    text:"A spam filter has a <strong>90% true-positive rate</strong> and a <strong>4% false-positive rate</strong>. If <strong>2%</strong> of all emails are spam, what is the probability an email flagged as spam is <em>actually</em> spam? (Round to 3 decimal places.)",
    choices:["0.319","0.450","0.215","0.380"], answer:0, solution:"P(spam|flag) = 0.90×0.02 / (0.90×0.02 + 0.04×0.98) = 0.018/0.0572 ≈ 0.315 → closest: 0.319", hint:"Bayes' theorem: P(A|B) = P(B|A)·P(A) / P(B). Expand P(B) using the law of total probability." },
  { section:"Probability", sectionTag:"tag-prob", sectionColor:"#f59e0b", id:"prob3", type:"mc",
    text:"Using the same spam filter (90% true-positive, 4% false-positive, 2% base rate), if an email is <em>not</em> flagged, what best describes the situation?",
    choices:["The email is definitely not spam","There is still a small chance it is spam (a missed detection)","The filter is broken","The base rate of spam doubles"],
    answer:1, solution:"A 90% true-positive rate means 10% of real spam slips through unflagged — there's always a small miss rate.", hint:"Think about what the true-positive rate tells you about missed detections." },
  { section:"Statistics", sectionTag:"tag-stat", sectionColor:"#14b8a6", id:"stat1", type:"numeric",
    text:'A sample of 5 house prices: <span class="math">$250k, $310k, $310k, $410k, $470k</span>. What is the <strong>mean</strong> price in thousands of dollars?',
    answer:350, tolerance:0, solution:"Mean = (250+310+310+410+470)/5 = 1750/5 = 350", hint:"Mean = (sum of all values) / (number of values)" },
  { section:"Statistics", sectionTag:"tag-stat", sectionColor:"#14b8a6", id:"stat2", type:"mc",
    text:'Using the same 5 prices — <span class="math">$250k, $310k, $310k, $410k, $470k</span> — what are the <strong>median</strong> and <strong>mode</strong>?',
    choices:["Median = $310k, Mode = $310k","Median = $360k, Mode = $250k","Median = $310k, Mode = $250k","Median = $370k, Mode = $310k"],
    answer:0, solution:"Sorted: 250,310,310,410,470. Middle value = 310 = median. Most frequent = 310 = mode.", hint:"Sort the values first. Median = middle value. Mode = most frequent value." },
  { section:"Statistics", sectionTag:"tag-stat", sectionColor:"#14b8a6", id:"stat3", type:"mc",
    text:'A house price distribution has mean <span class="math">$380k</span> and std dev <span class="math">$50k</span>. What is the z-score for a house priced at <span class="math">$430k</span>?',
    choices:["z = 1.0 — one std dev above the mean","z = 0.5 — slightly below average","z = 2.0 — two std devs above the mean","z = −1.0 — below average"],
    answer:0, solution:"z = (430−380)/50 = 50/50 = 1.0 → one standard deviation above the mean.", hint:"z = (x − μ) / σ" },

const state = { answers: {}, studentName: '' };

function validateAndStart() {
  const nameEl = document.getElementById('student-name');
  const errEl  = document.getElementById('form-error');
  const name   = nameEl.value.trim();
  nameEl.classList.remove('cover-input-error');
  errEl.textContent = '';
  if (!name) { nameEl.classList.add('cover-input-error'); errEl.textContent = 'Please enter your name.'; return; }
  state.studentName = name;
  startExam();
}

function startExam() {
  document.getElementById('cover').style.display = 'none';
  const exam = document.getElementById('exam');
  exam.style.display = 'block';
  renderExam(exam);
}

function renderExam(container) {
  let html = `<div class="progress-bar-wrap">
    <div class="progress-meta">
      <span id="progress-label">0 / ${QUESTIONS.length} answered</span>
      <span id="score-live" style="color:var(--accent)">0 correct</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>`;
  let currentSection = '';
  let sectionIdx = -1;
  QUESTIONS.forEach((q, i) => {
    if (q.section !== currentSection) {
      currentSection = q.section; sectionIdx++;
      const s = SECTIONS[sectionIdx];
      html += `<div class="section-header">
        <div class="section-number">0${sectionIdx+1}</div>
        <div class="section-info">
          <div class="section-name" style="color:${s.color}">${s.name}</div>
          <div class="section-desc">${s.desc}</div>
        </div>
        <div class="section-line" style="background:${s.color};opacity:0.2"></div>
      </div>`;
    }
    html += `<div class="q-card" id="card-${q.id}">
      <div class="q-label"><span class="q-num">Q${i+1}</span><span class="q-badge ${q.sectionTag}" style="font-size:0.68rem;padding:0.2rem 0.6rem;border-radius:2px;">${q.section}</span></div>
      <div class="q-text">${q.text}</div>`;
    if (q.type === 'mc') {
      html += '<div class="choices">';
      q.choices.forEach((c, ci) => {
        const letter = ['A','B','C','D'][ci];
        html += `<button class="choice-btn" id="choice-${q.id}-${ci}" onclick="selectChoice('${q.id}', ${ci})"><span class="choice-letter">${letter}</span><span>${c}</span></button>`;
      });
      html += '</div>';
    } else {
      html += `<div class="num-input-wrap">
        <input class="num-input" type="number" id="input-${q.id}" placeholder="Answer" step="any"
          onkeydown="if(event.key==='Enter') checkNumeric('${q.id}', ${q.answer}, ${q.tolerance})">
        <button class="btn-check" id="btn-${q.id}" onclick="checkNumeric('${q.id}', ${q.answer}, ${q.tolerance})">Check</button>
      </div>`;
    }
    html += `<div class="feedback" id="fb-${q.id}"></div></div>`;
  });
  html += `<div style="text-align:center;margin-top:3rem"><button class="btn-start" onclick="showResults()">Submit Exam →</button></div>`;
  container.innerHTML = html;
}

function selectChoice(qid, chosen) {
  const q = QUESTIONS.find(q => q.id === qid);
  if (state.answers[qid]) return;
  const correct = chosen === q.answer;
  state.answers[qid] = { correct, chosen };
  q.choices.forEach((_, ci) => {
    const btn = document.getElementById(`choice-${qid}-${ci}`);
    btn.disabled = true;
    if (correct) {
      if (ci === q.answer) btn.classList.add('reveal-correct');
    } else {
      if (ci === chosen) btn.classList.add('selected-wrong');
    }
  });
  showFeedback(qid, correct, q.solution, q.hint);
  document.getElementById(`card-${qid}`).classList.add(correct ? 'answered-correct' : 'answered-wrong');
  updateProgress();
}

function checkNumeric(qid, correctVal, tolerance) {
  const q = QUESTIONS.find(q => q.id === qid);
  if (state.answers[qid]) return;
  const input = document.getElementById(`input-${qid}`);
  const val = parseFloat(input.value);
  if (isNaN(val)) { input.style.borderColor = 'var(--wrong)'; return; }
  const correct = Math.abs(val - correctVal) <= (tolerance || 0);
  state.answers[qid] = { correct };
  input.disabled = true;
  input.classList.add(correct ? 'correct-input' : 'wrong-input');
  document.getElementById(`btn-${qid}`).disabled = true;
  showFeedback(qid, correct, q.solution, q.hint);
  document.getElementById(`card-${qid}`).classList.add(correct ? 'answered-correct' : 'answered-wrong');
  updateProgress();
}

function showFeedback(qid, correct, solution, hint) {
  const fb = document.getElementById(`fb-${qid}`);
  fb.classList.add('show');
  if (correct) {
    fb.classList.add('correct-fb');
    fb.innerHTML = `✓ Correct! <div class="solution">${solution}</div>`;
  } else {
    fb.classList.add('wrong-fb');
    fb.innerHTML = `<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem">
      <span>✗ Not quite. <div class="solution" style="margin-top:0.4rem">💡 Hint: ${hint}</div></span>
      <button class="btn-retry" onclick="retryQuestion('${qid}')">↺ Retry</button>
    </div>`;
  }
}

function retryQuestion(qid) {
  const q = QUESTIONS.find(q => q.id === qid);
  // Clear answer state
  delete state.answers[qid];
  // Reset card border
  const card = document.getElementById(`card-${qid}`);
  card.classList.remove('answered-correct', 'answered-wrong');
  // Reset feedback
  const fb = document.getElementById(`fb-${qid}`);
  fb.classList.remove('show', 'correct-fb', 'wrong-fb');
  fb.innerHTML = '';
  if (q.type === 'mc') {
    // Re-enable and reset all choice buttons
    q.choices.forEach((_, ci) => {
      const btn = document.getElementById(`choice-${qid}-${ci}`);
      btn.disabled = false;
      btn.classList.remove('selected-correct', 'selected-wrong', 'reveal-correct');
    });
  } else {
    // Re-enable numeric input
    const input = document.getElementById(`input-${qid}`);
    input.disabled = false;
    input.value = '';
    input.classList.remove('correct-input', 'wrong-input');
    input.style.borderColor = '';
    document.getElementById(`btn-${qid}`).disabled = false;
    input.focus();
  }
  updateProgress();
}

function updateProgress() {
  const answered = Object.keys(state.answers).length;
  const correct  = Object.values(state.answers).filter(a => a.correct).length;
  const total    = QUESTIONS.length;
  document.getElementById('progress-label').textContent = `${answered} / ${total} answered`;
  document.getElementById('score-live').textContent = `${correct} correct`;
  document.getElementById('prog-fill').style.width = `${(answered/total)*100}%`;
}

function showResults() {
  QUESTIONS.forEach(q => { if (!state.answers[q.id]) state.answers[q.id] = { correct: false }; });
  document.getElementById('exam').style.display = 'none';
  const results = document.getElementById('results');
  results.style.display = 'block';

  const total   = QUESTIONS.length;
  const correct = Object.values(state.answers).filter(a => a.correct).length;
  const pct     = Math.round((correct/total)*100);
  const isPerfect = correct === total;

  const sectionData = {};
  SECTIONS.forEach(s => { sectionData[s.name] = { total:0, correct:0, color:s.color, tag:s.tag }; });
  QUESTIONS.forEach(q => { sectionData[q.section].total++; if (state.answers[q.id]?.correct) sectionData[q.section].correct++; });

  const grade = isPerfect ? "Perfect Score!" : pct >= 75 ? "Solid Work" : pct >= 60 ? "Getting There" : "Keep Practicing";
  const sub   = isPerfect
    ? `Congratulations, ${state.studentName.split(' ')[0]}! You've mastered all four modules.`
    : pct >= 75 ? "Strong understanding across all four topics."
    : pct >= 60 ? "Review the sections where you dropped points."
    : "Go back through the lectures and try again.";

  const r = 54, circ = 2*Math.PI*r;
  const dash = (pct/100)*circ;
  const ringColor = isPerfect ? "var(--accent2)" : "var(--accent)";

  let html = `<div class="result-hero">
    <div class="score-ring">
      <svg width="140" height="140" viewBox="0 0 140 140">
        <circle cx="70" cy="70" r="${r}" fill="none" stroke="var(--border)" stroke-width="8"/>
        <circle cx="70" cy="70" r="${r}" fill="none" stroke="${ringColor}" stroke-width="8"
          stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/>
      </svg>
      <div class="score-ring-text">
        <div class="score-pct" style="color:${ringColor}">${pct}%</div>
        <div class="score-label">${correct}/${total}</div>
      </div>
    </div>
    <div class="result-title" style="${isPerfect ? 'color:var(--accent2)' : ''}">${grade}</div>
    <div class="result-subtitle">${sub}</div>
  </div>`;

  if (isPerfect) {
    html += `<div class="cert-wrap" id="cert-display">
      <div class="cert-bg" style="background-image:url('${STARFIELD_URL}')"></div>
      <div class="cert-content" style="position:relative">
        <div class="cert-eyebrow">Certificate of Completion</div>
        <div class="cert-name">${state.studentName}</div>
        <div class="cert-body">
          has successfully completed<br>
          <strong style="color:var(--accent)">Justin's Math in AI Bootcamp</strong><br>
          with a perfect score on the final exam.
        </div>
        <div class="cert-badges">
          <span class="cert-badge tag-la">Linear Algebra</span>
          <span class="cert-badge tag-calc">Calculus</span>
          <span class="cert-badge tag-prob">Probability</span>
          <span class="cert-badge tag-stat">Statistics</span>
        </div>
        <img src="${QR_URL}" style="position:absolute;top:1rem;right:1rem;width:60px;height:60px;background:#fff;padding:3px;border-radius:4px">
      </div>
    </div>
    <div class="cert-actions">
      <button class="btn-download" onclick="downloadCertificate()">⬇ Download Certificate</button>
      <a class="btn-demo" href="https://your-demo-link-here.com" target="_blank">🔬 ML Visualization Demo</a>
    </div>
    <div class="demo-password">Bookmark for future access &nbsp;·&nbsp; Password: <span>CalvinandHobbes</span></div>`;
  }

  html += `<div class="section-scores">`;
  Object.entries(sectionData).forEach(([name, d]) => {
    const sp = Math.round((d.correct/d.total)*100);
    html += `<div class="section-score-card">
      <div class="ss-name" style="color:${d.color}">${name}</div>
      <div class="ss-bar-wrap"><div class="ss-bar" style="width:${sp}%;background:${d.color}"></div></div>
      <div class="ss-fraction">${d.correct} / ${d.total} correct</div>
    </div>`;
  });
  html += `</div><button class="btn-retake" onclick="retake()">↩ Retake Exam</button>`;
  results.innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function downloadCertificate() {
  const canvas = document.getElementById('cert-canvas');
  const W = 900, H = 560;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  const img = new Image();
  img.onload = () => {
    ctx.drawImage(img, 0, 0, W, H);
    ctx.fillStyle = 'rgba(10,14,26,0.45)';
    ctx.fillRect(0, 0, W, H);

    // Borders
    ctx.strokeStyle = 'rgba(240,165,0,0.59)'; ctx.lineWidth = 2;
    ctx.strokeRect(20,20,W-40,H-40);
    ctx.strokeStyle = 'rgba(240,165,0,0.24)'; ctx.lineWidth = 1;
    ctx.strokeRect(27,27,W-54,H-54);

    const cxFull = (text) => (W - ctx.measureText(text).width) / 2;
    const mh = (text, font) => { ctx.font = font; return 22; }; // approx line height

    // QR — top right, no label
    const qrEl = new Image();
    qrEl.onload = () => {
      const qrS=88, qrP=6;
      const qrX=W-qrS-40, qrY=38;
      ctx.fillStyle='rgba(255,255,255,0.9)';
      ctx.beginPath(); ctx.roundRect(qrX-qrP,qrY-qrP,qrS+qrP*2,qrS+qrP*2,5); ctx.fill();
      ctx.drawImage(qrEl,qrX,qrY,qrS,qrS);

      // Eyebrow — near top, centered
      ctx.font='bold 16px monospace';
      const eyebrow='CERTIFICATE OF COMPLETION';
      const ex=cxFull(eyebrow), ey=46;
      ctx.fillStyle='rgba(240,165,0,1)';
      ctx.fillText(eyebrow,ex,ey+16);
      const ew=ctx.measureText(eyebrow).width;
      ctx.strokeStyle='rgba(240,165,0,0.4)'; ctx.lineWidth=1;
      ctx.strokeRect(ex-10,ey,ew+20,28);

      // Measure block for vertical centering
      // name(~58px) + divider(18) + gap + 3 body lines + gap + badges(26)
      const LG = 12;
      const nameH=58, divH=10, l1H=24, l2H=28, l3H=24, badgeH=26;
      const blockH = nameH+divH+LG+l1H+LG+l2H+LG+l3H+LG+badgeH;
      let y = Math.round((H - blockH) / 2);

      // Name
      ctx.font='italic 54px serif'; ctx.fillStyle='rgba(232,237,245,1)';
      const name=state.studentName;
      ctx.fillText(name, cxFull(name), y+nameH);
      const nw=ctx.measureText(name).width;
      ctx.strokeStyle='rgba(255,255,255,0.22)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(W/2-nw/2,y+nameH+8); ctx.lineTo(W/2+nw/2,y+nameH+8); ctx.stroke();
      y += nameH+divH+LG;

      // Body lines
      ctx.font='20px serif'; ctx.fillStyle='rgba(232,237,245,0.78)';
      ctx.fillText('has successfully completed',cxFull('has successfully completed'),y+l1H);
      y+=l1H+LG;
      ctx.font='bold 24px serif'; ctx.fillStyle='rgba(78,204,163,1)';
      const bc="Justin's Math in AI Bootcamp";
      ctx.fillText(bc,cxFull(bc),y+l2H);
      y+=l2H+LG;
      ctx.font='20px serif'; ctx.fillStyle='rgba(232,237,245,0.7)';
      const l3='with a perfect score on the final exam';
      ctx.fillText(l3,cxFull(l3),y+l3H);
      y+=l3H+LG;

      // Badges
      const badges=[['LINEAR ALGEBRA','#6366f1'],['CALCULUS','#ec4899'],
                    ['PROBABILITY','#f59e0b'],['STATISTICS','#14b8a6']];
      ctx.font='bold 11px monospace';
      const bw=148,bh=26,bgap=8;
      const totalBW=badges.length*bw+(badges.length-1)*bgap;
      let bx=(W-totalBW)/2;
      badges.forEach(([label,color])=>{
        const r=parseInt(color.slice(1,3),16),g=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16);
        ctx.fillStyle=`rgba(${r},${g},${b},0.2)`;
        ctx.beginPath(); ctx.roundRect(bx,y,bw,bh,4); ctx.fill();
        ctx.strokeStyle=`rgba(${r},${g},${b},0.53)`; ctx.lineWidth=1;
        ctx.beginPath(); ctx.roundRect(bx,y,bw,bh,4); ctx.stroke();
        ctx.fillStyle=`rgb(${r},${g},${b})`;
        const tw=ctx.measureText(label).width;
        ctx.fillText(label,bx+(bw-tw)/2,y+18);
        bx+=bw+bgap;
      });

      // Download
      const link=document.createElement('a');
      link.download=`MathInAI_Certificate_${state.studentName.replace(/[^a-z0-9]/gi,'_')}.png`;
      link.href=canvas.toDataURL('image/png');
      link.click();
    };
    qrEl.src = QR_URL;
  };
  img.src = STARFIELD_URL;
}
